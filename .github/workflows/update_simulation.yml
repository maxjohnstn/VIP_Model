name: Update Solar Simulation

on:
  schedule:
    - cron: '0 * * * *'   # runs every hour
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pvlib requests pandas numpy scipy

      - name: Run simulation
        run: python3 solar_simulation.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/simulation_output.json public/data/simulation_output.json
          git diff --staged --quiet || git commit -m "Auto-update simulation output [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
