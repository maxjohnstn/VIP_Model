name: Update Solar Simulation

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  simulate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        run: pip install pvlib requests pandas numpy scipy

      - name: Install Node dependencies
        run: npm install

      - name: Run simulation
        env:
          SG_APP_KEY: ${{ secrets.SG_APP_KEY }}
          SG_APP_SECRET: ${{ secrets.SG_APP_SECRET }}
          GITHUB_REPO_PATH: ${{ github.workspace }}
        run: python3 solar_simulation.py

      - name: Build dashboard
        run: npm run build

      - name: Build dashboard
        run: npm run build

      - name: Disable Jekyll
        run: touch docs/.nojekyll

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --staged --quiet || git commit -m "Auto-update simulation [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push